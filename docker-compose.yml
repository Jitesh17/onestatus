# Full stack: frontend (nginx, port 8080) + backend (FastAPI) + Ollama, all local.
#
#   docker compose up --build
#   docker compose exec ollama ollama pull qwen2.5:7b   # one-time, ~4.7 GB
#   open http://localhost:8080
#
# SQLite on the app_data volume is the default database. To use Postgres instead:
#   docker compose --profile postgres up --build
# and set DATABASE_URL in .env to the postgres URL (see .env.example).
# NVIDIA GPU for Ollama: add -f docker-compose.yml -f docker-compose.gpu.yml.
services:
  ollama:
    image: ollama/ollama
    volumes:
      - ollama_models:/root/.ollama
    healthcheck:
      # The ollama image has no curl; the CLI itself answers once the server is up.
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////data/onestatus.db}
      OLLAMA_URL: http://ollama:11434
      SEED_ON_START: ${SEED_ON_START:-1}
      # First admin account, created only when the users table is empty.
      # Set ADMIN_PASSWORD in .env before the first start.
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      # 1 adds demo login accounts (admin/admin, alex, sam, ...). Demos only;
      # never enable on a deployment holding real data.
      SEED_DEMO_USERS: ${SEED_DEMO_USERS:-0}
      # No Swagger/openapi in deployments; only nginx fronts the API.
      API_DOCS: ${API_DOCS:-0}
    volumes:
      - app_data:/data
      - whisper_cache:/cache/hf
    depends_on:
      ollama:
        condition: service_healthy
    # The API is reachable only through the frontend's /api proxy. For local
    # debugging, uncomment to bind it to this machine only (never 0.0.0.0):
    # ports: ["127.0.0.1:8000:8000"]

  frontend:
    build: ./frontend
    # FRONTEND_PORT in .env moves the app when 8080 is taken on the host.
    ports: ["${FRONTEND_PORT:-8080}:80"]
    environment:
      # Optional extra gate in front of the app's own login (basic auth at
      # nginx). Empty = no extra prompt; the app login still applies.
      APP_USER: ${APP_USER:-onestatus}
      APP_PASSWORD: ${APP_PASSWORD:-}
    depends_on: [backend]

  db:
    image: postgres:16
    profiles: ["postgres"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-onestatus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onestatus}
      POSTGRES_DB: ${POSTGRES_DB:-onestatus}
    # The backend reaches postgres on the compose network; no host port needed.
    # For psql from this machine, uncomment (bind to localhost only):
    # ports: ["127.0.0.1:${POSTGRES_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

volumes:
  ollama_models:
  app_data:
  whisper_cache:
  pgdata:
