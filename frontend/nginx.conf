# Serves the built SPA and proxies /api to the backend container.
server {
    listen 80;

    # Written at container start by docker-entrypoint.d/40-basic-auth.sh:
    # empty when APP_PASSWORD is unset, basic-auth directives when it is set.
    # Covers everything on this server: the app, /api, and the settings panel.
    include /etc/nginx/snippets/auth.conf;

    # Audio uploads go through this proxy; nginx default is 1m, which would 413
    # a voice memo before the backend's own 25 MB cap could answer. 30m keeps the
    # backend the authority on the limit.
    client_max_body_size 30m;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing: unknown paths fall back to the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Trailing slash on proxy_pass strips the /api prefix, exactly like the Vite
    # dev proxy rewrite, so the frontend code is identical in dev and deploy.
    location /api/ {
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Whisper on CPU can take a while on long clips; match the backend timeout.
        proxy_read_timeout 180s;
    }
}
